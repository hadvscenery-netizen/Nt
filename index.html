<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ใบสั่งซื้อสินค้า | THE SCENERY VINTAGE FARM</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2f2f2f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="PO Scenery">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
*{box-sizing:border-box}
body{margin:0;background:#f0f1f3;font-family:Segoe UI,Tahoma,sans-serif;color:#222}
.page{max-width:1800px;margin:32px auto;background:#fff;padding:32px 36px;border-radius:16px}
.header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid #d6d9de;padding-bottom:16px;flex-wrap:wrap;gap:12px}
.header-left h1{margin:0;font-size:28px}
.header-left h2{margin:4px 0 0;font-size:16px;color:#666}
.header-right{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
label{font-size:12px;font-weight:600;color:#555}
input,textarea,select{width:100%;padding:6px 8px;border:1px solid #d1d5db;border-radius:8px;font-size:12px;font-family:inherit}
textarea{resize:vertical}
.card{margin-top:24px;background:#fafafa;padding:20px;border-radius:16px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#2f2f2f;color:#fff;padding:8px}
td{padding:6px;border-bottom:1px solid #e5e7eb;vertical-align:top}
.btn{padding:8px 18px;border-radius:12px;font-weight:600;border:none;cursor:pointer}
.btn.add{background:#e6e8ec}
.btn-del{background:#fee2e2;border:none;border-radius:8px;padding:4px 8px;cursor:pointer}
.actions{margin-top:20px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.img-box{width:130px;height:130px;border:2px dashed #94a3b8;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;background:#fff}
.img-box img{width:100%;height:100%;object-fit:cover}
.img-hint{font-size:11px;color:#64748b;text-align:center}
.sub-row td{background:#f9fafb}
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.empty-state{padding:40px;text-align:center;color:#64748b;font-size:14px}

/* order bar */
.order-bar{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;background:#f5f6f8;border-radius:14px;padding:14px 18px;margin-top:20px}
.order-bar .field{min-width:220px}
.order-bar .btnrow{display:flex;gap:8px}
.btn-sm{padding:8px 14px;border-radius:10px;font-weight:600;border:none;cursor:pointer;font-size:12px;white-space:nowrap}
.btn-new{background:#2563eb;color:#fff}
.btn-del-order{background:#fee2e2;color:#b91c1c}
.badge-count{font-size:11px;color:#64748b;margin-left:4px}

/* vendor cell */
.vendor-cell{display:flex;flex-direction:column;gap:4px}
.vendor-cell input{width:100%}
.vendor-link-row{display:flex;align-items:center;gap:4px}
.vendor-link-row input{flex:1}
.vendor-link-btn{display:inline-flex;align-items:center;justify-content:center;padding:4px 7px;border-radius:7px;background:#dbeafe;border:none;cursor:pointer;font-size:13px;text-decoration:none;color:#1d4ed8;white-space:nowrap;flex-shrink:0}
.vendor-link-btn:hover{background:#bfdbfe}

/* install button */
#installBtn{display:none;padding:8px 18px;border-radius:12px;font-weight:600;border:none;cursor:pointer;background:#2f2f2f;color:#fff;gap:6px;align-items:center}
#installBtn.visible{display:inline-flex}

/* popup */
.popup-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:3000}
.popup{background:#fff;border-radius:18px;padding:24px;width:380px;text-align:center;transform:translateY(20px) scale(.95);opacity:0;transition:.25s ease}
.popup.show{transform:none;opacity:1}
.popup-actions{display:flex;gap:10px;justify-content:center;margin-top:18px}
.popup .danger{background:#dc2626;color:#fff}
.popup .primary{background:#2563eb;color:#fff}
.popup .ghost{background:#e5e7eb}
.popup-input{width:100%;margin-top:12px;padding:8px 10px;border:1px solid #d1d5db;border-radius:10px;font-size:13px;text-align:left}

@media print{button,.btn-del,.order-bar .btnrow,#installBtn{display:none!important}}
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <div class="header-left">
      <h1>ใบสั่งซื้อสินค้า</h1>
      <h2>THE SCENERY VINTAGE FARM</h2>
    </div>
    <div class="header-right">
      <div><label>เดือน</label><input type="month" id="monthPicker"></div>
      <button id="installBtn" title="ติดตั้งแอปลงเครื่อง">📲 ติดตั้งแอป</button>
    </div>
  </div>

  <!-- order bar: pick / create / delete a department's order within the selected month -->
  <div class="order-bar" id="orderBar" style="display:none">
    <div class="field">
      <label>ใบสั่งซื้อ (แผนก) ในเดือนนี้ <span class="badge-count" id="orderCount"></span></label>
      <select id="orderSelect"></select>
    </div>
    <div class="field">
      <label>แผนก</label>
      <input type="text" id="deptInput" placeholder="ชื่อแผนก">
    </div>
    <div class="btnrow">
      <button class="btn-sm btn-new" id="newOrderBtn">+ ใบสั่งซื้อแผนกใหม่</button>
      <button class="btn-sm btn-del-order" id="delOrderBtn">🗑 ลบใบสั่งซื้อนี้</button>
    </div>
  </div>

  <div class="card" id="cardArea" style="display:none">
    <table>
      <thead>
        <tr>
          <th>#</th><th>รายละเอียด</th><th>รูป</th><th>หน่วย</th>
          <th>สต็อก</th><th>คงเหลือ</th><th>ซื้อเพิ่ม</th>
          <th>ราคา</th><th>รวม</th><th>ร้าน / ลิงก์</th><th>ลบ</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <button class="btn add" id="addBtn">+ เพิ่มรายการ</button>
  </div>

  <div id="emptyMonthState" class="empty-state">กรุณาเลือกเดือนเพื่อเริ่มสร้างใบสั่งซื้อ</div>

  <div class="actions" id="actionsArea" style="display:none">
    <strong>รวม <span id="grand">0.00</span> บาท</strong>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn add" onclick="exportData()">💾 เซฟข้อมูล</button>
      <button class="btn add" onclick="importData()">📂 กู้ข้อมูล</button>
      <input type="file" id="importFile" accept=".json" hidden>
      <button class="btn" onclick="exportHTML()">📄 ส่งออก HTML (กดลิงก์ได้)</button>
      <button class="btn" onclick="window.print()">🖨 พิมพ์ / Save PDF</button>
    </div>
  </div>
</div>

<!-- popup -->
<div class="popup-backdrop" id="popup">
  <div class="popup" id="popupBox">
    <h3 id="popupTitle"></h3>
    <p id="popupMsg"></p>
    <div id="popupExtra"></div>
    <div class="popup-actions" id="popupActions"></div>
  </div>
</div>

<script>
/* ── PWA: Service Worker ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

/* ── PWA: Install button ── */
let deferredPrompt = null;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.classList.add('visible');
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') {
    installBtn.classList.remove('visible');
  }
  deferredPrompt = null;
});

window.addEventListener('appinstalled', () => {
  installBtn.classList.remove('visible');
  deferredPrompt = null;
});

/* ── Popup ── */
const popup = document.getElementById('popup');
const popupBox = document.getElementById('popupBox');

popup.addEventListener('click', e => { if (e.target === popup) closePopup(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopup(); });

function showPopup({ title, msg, extra = '', actions = [] }) {
  popupTitle.innerText = title;
  popupMsg.innerText = msg || '';
  document.getElementById('popupExtra').innerHTML = extra;
  popupActions.innerHTML = '';
  actions.forEach(a => {
    const b = document.createElement('button');
    b.className = 'btn ' + (a.type || 'ghost');
    b.innerText = a.label;
    b.onclick = () => { closePopup(); a.onClick && a.onClick(); };
    popupActions.appendChild(b);
  });
  popup.style.display = 'flex';
  requestAnimationFrame(() => popupBox.classList.add('show'));
}
function closePopup() {
  popupBox.classList.remove('show');
  setTimeout(() => popup.style.display = 'none', 200);
}

/* ── IndexedDB (row images — unchanged, keyed by row id so nothing is lost) ── */
let dbReady = false, db;
const dbReq = indexedDB.open('PO_IMAGES', 1);
dbReq.onupgradeneeded = e => { db = e.target.result; db.createObjectStore('images', { keyPath: 'id' }); };
dbReq.onsuccess = e => { db = e.target.result; dbReady = true; };

/* ================= multi-department order management ================= */
/*
  NEW storage model (so >1 department per month is possible):
    localStorage 'PO_INDEX'      -> { "2569-07": [ {id, dept}, ... ], ... }
    localStorage 'PO_ORDER_<id>' -> { dept, month, rows:[...] }

  OLD storage model (kept intact, never deleted, so nothing you already
  saved is lost):
    localStorage 'PO_<month>'    -> { dept, rows:[...] }

  On first visit to a given month, if that month has no entry yet in
  PO_INDEX but DOES have old-style data under 'PO_<month>', that old data
  is automatically migrated into a brand-new order (same dept name, same
  rows) inside PO_INDEX / PO_ORDER_<id>. The original 'PO_<month>' key is
  left untouched as a backup.
*/
const monthPicker = document.getElementById('monthPicker');
const deptInput = document.getElementById('deptInput');
const tbody = document.getElementById('tbody');
const addBtn = document.getElementById('addBtn');
const orderBar = document.getElementById('orderBar');
const orderSelect = document.getElementById('orderSelect');
const orderCount = document.getElementById('orderCount');
const newOrderBtn = document.getElementById('newOrderBtn');
const delOrderBtn = document.getElementById('delOrderBtn');
const cardArea = document.getElementById('cardArea');
const actionsArea = document.getElementById('actionsArea');
const emptyMonthState = document.getElementById('emptyMonthState');

let currentOrderId = null;

function uuid() {
  return (crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now() + '-' + Math.random().toString(16).slice(2));
}

function getIndex() {
  try { return JSON.parse(localStorage.getItem('PO_INDEX') || '{}'); }
  catch { return {}; }
}
function setIndex(idx) {
  localStorage.setItem('PO_INDEX', JSON.stringify(idx));
}

function ordersForMonth(month) {
  const idx = getIndex();
  return idx[month] || [];
}

/* migrate legacy single-order-per-month data the first time a month is opened */
function migrateLegacyIfNeeded(month) {
  const idx = getIndex();
  if (idx[month] && idx[month].length > 0) return; // already has new-format data

  const legacyRaw = localStorage.getItem('PO_' + month);
  if (!legacyRaw) return; // nothing to migrate

  let legacy;
  try { legacy = JSON.parse(legacyRaw); } catch { return; }

  const id = uuid();
  localStorage.setItem('PO_ORDER_' + id, JSON.stringify({
    dept: legacy.dept || '',
    month,
    rows: legacy.rows || []
  }));

  idx[month] = [{ id, dept: legacy.dept || '' }];
  setIndex(idx);
  // NOTE: legacy 'PO_' + month key is intentionally left in place as a backup.
}

function refreshOrderSelect(selectId) {
  const month = monthPicker.value;
  const list = ordersForMonth(month);
  orderSelect.innerHTML = '';
  list.forEach(o => {
    const opt = document.createElement('option');
    opt.value = o.id;
    opt.innerText = o.dept && o.dept.trim() ? o.dept : '(ยังไม่ตั้งชื่อแผนก)';
    orderSelect.appendChild(opt);
  });
  orderCount.innerText = list.length ? `(${list.length} แผนก)` : '';
  if (selectId && list.some(o => o.id === selectId)) {
    orderSelect.value = selectId;
  }
}

function setUiForHasMonth(hasOrders) {
  orderBar.style.display = monthPicker.value ? 'flex' : 'none';
  cardArea.style.display = hasOrders ? 'block' : 'none';
  actionsArea.style.display = hasOrders ? 'flex' : 'none';
  emptyMonthState.style.display = hasOrders ? 'none' : 'block';
  if (!monthPicker.value) {
    emptyMonthState.innerText = 'กรุณาเลือกเดือนเพื่อเริ่มสร้างใบสั่งซื้อ';
  } else if (!hasOrders) {
    emptyMonthState.innerText = 'ยังไม่มีใบสั่งซื้อในเดือนนี้ กด "+ ใบสั่งซื้อแผนกใหม่" เพื่อเริ่มต้น';
  }
}

monthPicker.onchange = () => {
  const month = monthPicker.value;
  if (!month) {
    currentOrderId = null;
    setUiForHasMonth(false);
    return;
  }
  migrateLegacyIfNeeded(month);
  const list = ordersForMonth(month);
  if (list.length === 0) {
    setUiForHasMonth(false);
    refreshOrderSelect();
  } else {
    refreshOrderSelect(list[0].id);
    loadOrder(list[0].id);
  }
};

orderSelect.onchange = () => { loadOrder(orderSelect.value); };

newOrderBtn.onclick = () => {
  if (!monthPicker.value) { showPopup({ title: 'กรุณาเลือกเดือนก่อน' }); return; }
  createNewOrder();
};

delOrderBtn.onclick = () => {
  if (!currentOrderId) return;
  showPopup({
    title: 'ยืนยันการลบใบสั่งซื้อนี้',
    msg: 'รายการสินค้าทั้งหมดในใบสั่งซื้อนี้จะถูกลบ',
    actions: [
      { label: 'ยกเลิก' },
      { label: 'ลบ', type: 'danger', onClick: deleteCurrentOrder }
    ]
  });
};

function createNewOrder() {
  const month = monthPicker.value;
  const id = uuid();
  const idx = getIndex();
  idx[month] = idx[month] || [];
  idx[month].push({ id, dept: '' });
  setIndex(idx);

  localStorage.setItem('PO_ORDER_' + id, JSON.stringify({ dept: '', month, rows: [] }));

  refreshOrderSelect(id);
  loadOrder(id);
}

function loadOrder(id) {
  currentOrderId = id;
  const raw = localStorage.getItem('PO_ORDER_' + id);
  const data = raw ? JSON.parse(raw) : { dept: '', rows: [] };
  deptInput.value = data.dept || '';
  tbody.innerHTML = '';
  (data.rows || []).forEach(addRow);
  renumber(); calcAll();
  refreshOrderSelect(id);
  setUiForHasMonth(true);
}

function deleteCurrentOrder() {
  const month = monthPicker.value;
  const id = currentOrderId;
  if (!id) return;

  localStorage.removeItem('PO_ORDER_' + id);
  const idx = getIndex();
  idx[month] = (idx[month] || []).filter(o => o.id !== id);
  if (idx[month].length === 0) delete idx[month];
  setIndex(idx);

  const remaining = ordersForMonth(month);
  if (remaining.length > 0) {
    refreshOrderSelect(remaining[0].id);
    loadOrder(remaining[0].id);
  } else {
    currentOrderId = null;
    tbody.innerHTML = '';
    deptInput.value = '';
    setUiForHasMonth(false);
  }
}

deptInput.oninput = () => {
  saveMonth();
  const month = monthPicker.value;
  const idx = getIndex();
  const entry = (idx[month] || []).find(o => o.id === currentOrderId);
  if (entry) {
    entry.dept = deptInput.value;
    setIndex(idx);
    refreshOrderSelect(currentOrderId);
  }
};

/* ================= row / table logic (per current order) ================= */

addBtn.onclick = () => {
  if (!currentOrderId) { showPopup({ title: 'กรุณาเลือกหรือสร้างใบสั่งซื้อก่อน' }); return; }
  addRow();
};

function addRow(d = {}) {
  const rowId = d.id || uuid();
  const m = document.createElement('tr');
  const s = document.createElement('tr'); s.className = 'sub-row';
  m.dataset.id = rowId;

  m.innerHTML = `
    <td class="no"></td>
    <td><textarea>${d.desc || ''}</textarea></td>
    <td><div class="img-box"><span class="img-hint">แนบรูป</span><input type="file" hidden></div></td>
    <td><input value="${d.unit || ''}"></td>
    <td><input type="number" value="${d.stock || ''}"></td>
    <td><input value="${d.remain || ''}"></td>
    <td><input type="number" class="buy" value="${d.buy || 0}"></td>
    <td><input type="number" class="price" value="${d.price || 0}"></td>
    <td class="sum">0.00</td>
    <td>
      <div class="vendor-cell">
        <input class="vendor-name" placeholder="ชื่อร้าน" value="${d.vendor || ''}">
        <div class="vendor-link-row">
          <input class="vendor-url" placeholder="https://..." value="${d.vendorUrl || ''}">
          <a class="vendor-link-btn" href="${d.vendorUrl || '#'}" target="_blank" title="เปิดลิงก์">🔗</a>
        </div>
      </div>
    </td>
    <td><button class="btn-del">🗑</button></td>`;

  s.innerHTML = `<td colspan="11"><div class="sub-grid">
    <div><label>จุดประสงค์</label><textarea>${d.purpose || ''}</textarea></div>
    <div><label>สถานที่ใช้งาน</label><textarea>${d.location || ''}</textarea></div>
  </div></td>`;

  tbody.append(m, s);
  bindRow(m, s);
  renumber(); calcAll(); saveMonth();
}

function bindRow(m, s) {
  [...m.querySelectorAll('input,textarea'), ...s.querySelectorAll('textarea')]
    .forEach(e => e.oninput = () => { calcAll(); saveMonth(); });

  const urlInput = m.querySelector('.vendor-url');
  const linkBtn = m.querySelector('.vendor-link-btn');
  urlInput.addEventListener('input', () => { linkBtn.href = urlInput.value.trim() || '#'; });
  linkBtn.addEventListener('click', e => {
    if (!urlInput.value.trim()) { e.preventDefault(); showPopup({ title: 'ยังไม่ได้ใส่ลิงก์' }); }
  });

  const rowId = m.dataset.id;
  const box = m.querySelector('.img-box');
  const input = box.querySelector('input');

  box.onclick = e => { if (e.target !== input) input.click(); };

  input.onchange = () => {
    if (!dbReady) return;
    const f = input.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      db.transaction('images', 'readwrite').objectStore('images').put({ id: rowId, data: r.result });
      let img = box.querySelector('img');
      if (!img) { img = document.createElement('img'); box.innerHTML = ''; box.appendChild(img); box.appendChild(input); }
      img.src = r.result;
    };
    r.readAsDataURL(f);
  };

  if (dbReady) {
    db.transaction('images', 'readonly').objectStore('images').get(rowId).onsuccess = e => {
      if (e.target.result) {
        const img = document.createElement('img'); img.src = e.target.result.data;
        box.innerHTML = ''; box.appendChild(img); box.appendChild(input);
      }
    };
  }

  m.querySelector('.btn-del').onclick = () => {
    showPopup({
      title: 'ยืนยันการลบ', actions: [
        { label: 'ยกเลิก' },
        { label: 'ลบ', type: 'danger', onClick: () => { m.nextSibling.remove(); m.remove(); renumber(); calcAll(); saveMonth(); } }
      ]
    });
  };
}

function renumber() { let i = 1; tbody.querySelectorAll('.no').forEach(n => n.innerText = i++); }

function calcAll() {
  let g = 0;
  tbody.querySelectorAll('.buy').forEach(b => {
    const tr = b.closest('tr');
    const s = ((b.value * tr.querySelector('.price').value) || 0).toFixed(2);
    tr.querySelector('.sum').innerText = s;
    g += +s;
  });
  grand.innerText = g.toFixed(2);
}

function getRows() {
  const rows = [];
  const trs = [...tbody.children];
  for (let i = 0; i < trs.length; i += 2) {
    const m = trs[i], s = trs[i + 1];
    rows.push({
      id: m.dataset.id,
      desc: m.children[1].querySelector('textarea').value,
      unit: m.children[3].querySelector('input').value,
      stock: m.children[4].querySelector('input').value,
      remain: m.children[5].querySelector('input').value,
      buy: m.children[6].querySelector('input').value,
      price: m.children[7].querySelector('input').value,
      vendor: m.querySelector('.vendor-name').value,
      vendorUrl: m.querySelector('.vendor-url').value,
      purpose: s.querySelectorAll('textarea')[0].value,
      location: s.querySelectorAll('textarea')[1].value
    });
  }
  return rows;
}

/* saves into the NEW per-order key. currentOrderId must exist (guaranteed once
   a month with at least one order is loaded / created). */
function saveMonth() {
  if (!currentOrderId || !monthPicker.value) return;
  localStorage.setItem('PO_ORDER_' + currentOrderId, JSON.stringify({
    dept: deptInput.value,
    month: monthPicker.value,
    rows: getRows()
  }));
}

/* ================= export / import (per current order) ================= */

function exportData() {
  if (!currentOrderId) { showPopup({ title: 'ไม่มีข้อมูล' }); return; }
  const data = localStorage.getItem('PO_ORDER_' + currentOrderId);
  if (!data) { showPopup({ title: 'ไม่มีข้อมูล' }); return; }
  const deptSlug = (deptInput.value || 'order').replace(/[^\wก-๙]+/g, '_');
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'PO_' + monthPicker.value + '_' + deptSlug + '.json';
  a.click();
}

function importData() {
  if (!currentOrderId) { showPopup({ title: 'กรุณาเลือกหรือสร้างใบสั่งซื้อก่อน' }); return; }
  document.getElementById('importFile').click();
}
document.getElementById('importFile').onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const parsed = JSON.parse(r.result);
      parsed.month = monthPicker.value;
      localStorage.setItem('PO_ORDER_' + currentOrderId, JSON.stringify(parsed));

      const idx = getIndex();
      const entry = (idx[monthPicker.value] || []).find(o => o.id === currentOrderId);
      if (entry) { entry.dept = parsed.dept || entry.dept; setIndex(idx); }

      loadOrder(currentOrderId);
      showPopup({ title: 'กู้ข้อมูลสำเร็จ' });
    } catch (err) {
      showPopup({ title: 'ไฟล์ไม่ถูกต้อง' });
    }
  };
  r.readAsText(f);
};

/* ── Export HTML ── */
function exportHTML() {
  if (!currentOrderId) { showPopup({ title: 'กรุณาเลือกหรือสร้างใบสั่งซื้อก่อน' }); return; }
  const defaultName = 'PO_' + monthPicker.value + (deptInput.value ? '_' + deptInput.value : '');
  showPopup({
    title: 'ตั้งชื่อไฟล์',
    msg: 'ชื่อไฟล์ที่จะบันทึก (.html จะเพิ่มให้อัตโนมัติ)',
    extra: `<input class="popup-input" id="filenameInput" value="${defaultName}" placeholder="ชื่อไฟล์">`,
    actions: [
      { label: 'ยกเลิก' },
      {
        label: 'ดาวน์โหลด', type: 'primary', onClick: () => {
          const fname = (document.getElementById('filenameInput')?.value?.trim() || defaultName).replace(/\.html$/i, '');
          doExportHTML(fname);
        }
      }
    ]
  });
  setTimeout(() => { const inp = document.getElementById('filenameInput'); if (inp) { inp.focus(); inp.select(); } }, 50);
}

function doExportHTML(filename) {
  const rows = getRows();
  const imagePromises = rows.map(row => new Promise(res => {
    if (!dbReady) { res({ id: row.id, data: null }); return; }
    const req = db.transaction('images', 'readonly').objectStore('images').get(row.id);
    req.onsuccess = e => res({ id: row.id, data: e.target.result ? e.target.result.data : null });
    req.onerror = () => res({ id: row.id, data: null });
  }));

  Promise.all(imagePromises).then(images => {
    const imgMap = {};
    images.forEach(i => imgMap[i.id] = i.data);

    let total = 0;
    const rowsHtml = rows.map((r, idx) => {
      const sum = ((+r.buy || 0) * (+r.price || 0));
      total += sum;
      const imgTag = imgMap[r.id]
        ? `<img src="${imgMap[r.id]}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;">`
        : `<div style="width:80px;height:80px;border:1px dashed #94a3b8;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#94a3b8;">ไม่มีรูป</div>`;
      let vendorHtml = '';
      if (r.vendor && r.vendorUrl) vendorHtml = `<a href="${r.vendorUrl}" target="_blank" style="color:#1d4ed8;text-decoration:underline;">${r.vendor}</a>`;
      else if (r.vendor) vendorHtml = `<span>${r.vendor}</span>`;
      else if (r.vendorUrl) vendorHtml = `<a href="${r.vendorUrl}" target="_blank" style="color:#1d4ed8;text-decoration:underline;">${r.vendorUrl}</a>`;
      return `
      <tr>
        <td style="text-align:center">${idx + 1}</td>
        <td>${(r.desc || '').replace(/\n/g, '<br>')}</td>
        <td style="text-align:center">${imgTag}</td>
        <td style="text-align:center">${r.unit || ''}</td>
        <td style="text-align:center">${r.stock || ''}</td>
        <td style="text-align:center">${r.remain || ''}</td>
        <td style="text-align:center">${r.buy || 0}</td>
        <td style="text-align:right">${(+r.price || 0).toLocaleString('th-TH', { minimumFractionDigits: 2 })}</td>
        <td style="text-align:right">${sum.toLocaleString('th-TH', { minimumFractionDigits: 2 })}</td>
        <td>${vendorHtml}</td>
      </tr>
      <tr style="background:#f9fafb">
        <td colspan="10" style="padding:6px 12px;font-size:11px;color:#555">
          <b>จุดประสงค์:</b> ${(r.purpose || '').replace(/\n/g, ' ')} &nbsp;&nbsp;
          <b>สถานที่ใช้งาน:</b> ${(r.location || '').replace(/\n/g, ' ')}
        </td>
      </tr>`;
    }).join('');

    const html = `<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8">
<title>ใบสั่งซื้อสินค้า ${monthPicker.value}</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Tahoma,sans-serif;color:#222;background:#f0f1f3}
.page{max-width:1400px;margin:32px auto;background:#fff;padding:32px 36px;border-radius:16px}
h1{margin:0;font-size:26px}h2{margin:4px 0 0;font-size:15px;color:#666}
.meta{font-size:13px;margin-top:8px;color:#444}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:20px}
th{background:#2f2f2f;color:#fff;padding:8px;text-align:center}
td{padding:6px 8px;border-bottom:1px solid #e5e7eb;vertical-align:middle}
.total{text-align:right;margin-top:16px;font-size:16px;font-weight:700}
a{color:#1d4ed8}
@media print{body{background:#fff}.page{margin:0;border-radius:0;padding:20px}}
</style></head><body>
<div class="page">
  <h1>ใบสั่งซื้อสินค้า</h1><h2>THE SCENERY VINTAGE FARM</h2>
  <div class="meta">เดือน: ${monthPicker.value} &nbsp;|&nbsp; แผนก: ${deptInput.value || '-'}</div>
  <table>
    <thead><tr><th>#</th><th>รายละเอียด</th><th>รูป</th><th>หน่วย</th><th>สต็อก</th><th>คงเหลือ</th><th>ซื้อเพิ่ม</th><th>ราคา</th><th>รวม</th><th>ร้าน / ลิงก์</th></tr></thead>
    <tbody>${rowsHtml}</tbody>
  </table>
  <div class="total">รวมทั้งหมด: ${total.toLocaleString('th-TH', { minimumFractionDigits: 2 })} บาท</div>
</div></body></html>`;

    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename + '.html';
    a.click();
    showPopup({ title: 'ส่งออกสำเร็จ ✅', msg: 'เปิดไฟล์ .html ด้วย browser กดลิงก์ร้านได้เลย หรือสั่งพิมพ์เป็น PDF จาก browser' });
  });
}

/* initial state */
setUiForHasMonth(false);
</script>
</body>
